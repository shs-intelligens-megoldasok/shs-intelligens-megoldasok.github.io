<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      // Redirect all 404s to index.html for SPA client-side routing
      sessionStorage.setItem('redirect', location.pathname + location.search + location.hash);
      location.replace('/');
    </script>
  </head>
  <body></body>
</html>
